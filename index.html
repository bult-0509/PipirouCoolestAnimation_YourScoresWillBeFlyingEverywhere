<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phigros HUD Automation System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 背景容器 -->
  <div class="background">
    <div class="bg-overlay"></div>
  </div>

  <!-- HUD 容器 -->
  <div class="hud-container" id="hud-container">
    <!-- 侧边栏，初始时在右侧半隐藏 -->
    <div class="bars-wrapper" id="bars-wrapper">
      <div class="bar-slot" id="bar-0">
        <div class="bar-bg"></div>
        <div class="bar-content"></div>
      </div>
      <div class="bar-slot" id="bar-1">
        <div class="bar-bg"></div>
        <div class="bar-content"></div>
      </div>
      <div class="bar-slot" id="bar-2">
        <div class="bar-bg"></div>
        <div class="bar-content"></div>
      </div>
    </div>
    
    <!-- 中央区域，用于结算展板的总计信息 -->
    <div class="summary-info hidden" id="summary-info">
      <div class="summary-text" id="summary-text">总分数：0000000</div>
    </div>
  </div>

  <!-- 操作控制台 -->
  <div class="control-panel">
    <h2>控制面板</h2>
    <div class="status-panel">
      当前槽位(x): <span id="status-x">0</span>
    </div>
    <div class="button-group">
      <button id="btn-1" class="btn">1. 选歌识别</button>
      <button id="btn-2" class="btn">2. 分数识别</button>
      <button id="btn-3" class="btn">3. 常规重置(中断)</button>
      <button id="btn-4" class="btn">4. 结算展板 (分数/Rating)</button>
      <button id="btn-5" class="btn">5. 结算后重置(退出)</button>
    </div>
  </div>

  <!-- 用于演示生成的元素的容器 -->
  <div id="dynamic-layer"></div>

  <script src="main.js"></script>
</body>
</html>
